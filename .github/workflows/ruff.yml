name: Ruff

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/ruff-action@v3
        with:
          version: ">=0.15.1"
          args: "--version"
      - run: | 
          echo "$PATH"
          which -a ruff || true
          ruff --version
      - run: ruff format --check --diff
